<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#4a90e2">
<title>CalcFlash ⚡</title>
<style>
*{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; margin:0; padding:0; }
html,body{ width:100%; background:#0f0f0f; font-family:Arial,sans-serif; color:white; overflow-x:hidden; }
.container{ width:100%; padding:8px; padding-top:4px; }
.topbar{ display:flex; justify-content:space-between; align-items:center; padding:4px 2px 6px 2px; }
.topbar-title{ font-size:16px; font-weight:bold; color:#4a90e2; letter-spacing:1px; }
.dots-btn{ background:none; border:none; color:#aaa; font-size:24px; cursor:pointer; padding:4px 8px; border-radius:8px; height:auto; width:auto; line-height:1; letter-spacing:2px; }
.dots-btn:active{ background:#2c2c2e; }
.menu-wrap{ position:relative; }
.menu-dropdown{ display:none; position:absolute; right:0; top:40px; background:#1c1c1e; border:1px solid #3a3a3c; border-radius:12px; min-width:190px; z-index:1000; overflow:hidden; box-shadow:0 8px 24px rgba(0,0,0,0.6); }
.menu-dropdown.open{ display:block; }
.menu-item{ padding:13px 16px; font-size:14px; cursor:pointer; border-bottom:1px solid #2c2c2e; display:flex; align-items:center; gap:10px; color:#ddd; }
.menu-item:last-child{ border-bottom:none; }
.menu-item:active{ background:#2c2c2e; }
.menu-item.active{ color:#4a90e2; background:#1a2a3a; }
.screen-expr{ font-size:12px; color:#555; text-align:right; padding:0 4px 2px 4px; min-height:16px; }
.screen{ width:100%; min-height:52px; background:#000; color:white; font-size:26px; text-align:right; padding:8px 12px; border-radius:10px; margin-bottom:6px; word-break:break-all; line-height:1.3; }
.buttons{ display:grid; grid-template-columns:repeat(4,1fr); gap:5px; }
button{ height:50px; border:none; border-radius:11px; background:#2c2c2e; color:white; font-size:15px; cursor:pointer; touch-action:manipulation; width:100%; }
button:active{ background:#555; }
.mem{ background:#3a3a3c; color:#aaa; font-size:12px; }
.op{ color:#4a90e2; font-size:17px; }
.clr{ color:#ff5f57; }
.eq{ background:#4a90e2; color:white; grid-row:span 2; height:105px; font-size:22px; }
.eq:active{ background:#357abd; }
/* FIX: sci-row default hidden, shown via JS */
.sci-row{ display:none; grid-template-columns:repeat(4,1fr); gap:5px; margin-bottom:5px; }
.sci{ background:#1a2535; color:#7eb8f7; font-size:12px; height:44px; }
.sci:active{ background:#2a3f5a; }
.mode-badge{ display:inline-block; background:#1e2d40; color:#7eb8f7; font-size:10px; padding:2px 8px; border-radius:8px; margin-left:6px; vertical-align:middle; }
.history-panel{ background:#1c1c1e; border-radius:12px; padding:8px; margin-bottom:8px; display:none; }
.history-panel.open{ display:block; }
.history-header{ display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
.history-header span{ color:#aaa; font-size:11px; text-transform:uppercase; letter-spacing:1px; }
.history-clear{ background:#3a3a3c; color:#ff5f57; border:none; font-size:11px; padding:4px 10px; border-radius:6px; cursor:pointer; height:auto; width:auto; }
.history-list{ max-height:180px; overflow-y:auto; }
.history-item{ padding:8px 10px; border-bottom:1px solid #2c2c2e; cursor:pointer; border-radius:6px; }
.history-item:active{ background:#2c2c2e; }
.history-item:last-child{ border-bottom:none; }
.h-expr{ font-size:12px; color:#666; }
.h-result{ font-size:16px; color:#4a90e2; text-align:right; }
.history-empty{ text-align:center; color:#444; font-size:13px; padding:20px; }
.section{ margin-top:8px; background:#1c1c1e; border-radius:12px; padding:8px; }
.section h3{ color:#aaa; font-size:11px; margin-bottom:5px; text-transform:uppercase; letter-spacing:1px; }
input[type=number]{ width:100%; padding:6px 10px; margin-bottom:5px; border-radius:8px; border:none; background:#2c2c2e; color:white; font-size:14px; }
.convert-btn{ background:#4a90e2; color:white; width:100%; padding:8px; font-size:14px; border-radius:9px; border:none; cursor:pointer; }
.result{ margin-top:5px; background:#000; padding:7px 10px; border-radius:8px; color:#4a90e2; font-size:14px; min-height:30px; text-align:right; }
.rate-info{ font-size:11px; color:#666; text-align:center; margin-top:4px; }
.live-badge{ background:#27ae60; color:white; font-size:10px; padding:2px 6px; border-radius:10px; margin-left:5px; }
.loading{ color:#f39c12; font-size:12px; text-align:center; padding:5px; }
.custom-select{ position:relative; margin-bottom:5px; }
.custom-select input.search-box{ width:100%; padding:6px 10px; border-radius:8px; border:none; background:#2c2c2e; color:white; font-size:13px; }
.custom-select input.search-box::placeholder{ color:#888; }
.dropdown-list{ display:none; position:absolute; width:100%; background:#1c1c1e; border:1px solid #4a90e2; border-radius:8px; max-height:180px; overflow-y:auto; z-index:999; top:36px; left:0; }
.dropdown-list.open{ display:block; }
.dropdown-item{ padding:8px 10px; cursor:pointer; font-size:13px; border-bottom:1px solid #2c2c2e; }
.dropdown-item:hover,.dropdown-item.selected{ background:#4a90e2; color:white; }
.selected-display{ width:100%; padding:6px 10px; border-radius:8px; border:1px solid #3a3a3c; background:#2c2c2e; color:white; font-size:13px; cursor:pointer; text-align:left; margin-bottom:2px; }
select{ width:100%; padding:6px 10px; margin-bottom:5px; border-radius:8px; border:none; background:#2c2c2e; color:white; font-size:13px; -webkit-appearance:none; appearance:none; }
</style>
</head>
<body>
<div class="container">

  <!-- Top Bar -->
  <div class="topbar">
    <div class="topbar-title">CalcFlash ⚡ <span class="mode-badge" id="modeBadge">Basic</span></div>
    <div class="menu-wrap">
      <button class="dots-btn" onclick="toggleMenu()">•••</button>
      <div class="menu-dropdown" id="menuDropdown">
        <div class="menu-item active" id="menuBasic" onclick="setMode('basic')">🔢 &nbsp;Basic Calculator</div>
        <div class="menu-item" id="menuSci" onclick="setMode('sci')">🔬 &nbsp;Scientific Calculator</div>
        <div class="menu-item" id="menuHistory" onclick="toggleHistory()">🕘 &nbsp;History</div>
      </div>
    </div>
  </div>

  <!-- History Panel -->
  <div class="history-panel" id="historyPanel">
    <div class="history-header">
      <span>🕘 History</span>
      <button class="history-clear" onclick="clearHistory()">Sab Clear</button>
    </div>
    <div class="history-list" id="historyList">
      <div class="history-empty">Abhi koi history nahi hai</div>
    </div>
  </div>

  <!-- Screen -->
  <div class="screen-expr" id="screenExpr"></div>
  <div class="screen" id="screen">0</div>

  <!-- Scientific Row -->
  <div class="sci-row" id="sciRow">
    <button class="sci" onclick="sciFunc('sin')">sin</button>
    <button class="sci" onclick="sciFunc('cos')">cos</button>
    <button class="sci" onclick="sciFunc('tan')">tan</button>
    <button class="sci" onclick="sciFunc('log')">log</button>
    <button class="sci" onclick="sciFunc('ln')">ln</button>
    <button class="sci" onclick="sciFunc('sqrt')">√x</button>
    <button class="sci" onclick="sciFunc('sq')">x²</button>
    <button class="sci" onclick="sciFunc('inv')">1/x</button>
    <button class="sci" onclick="insertConst('pi')">π</button>
    <button class="sci" onclick="insertConst('e')">e</button>
    <button class="sci" onclick="sciFunc('abs')">|x|</button>
    <button class="sci" onclick="press('**')">xʸ</button>
  </div>

  <!-- Main Buttons -->
  <div class="buttons">
    <button class="mem" onclick="memoryClear()">MC</button>
    <button class="mem" onclick="memoryAdd()">M+</button>
    <button class="mem" onclick="memorySub()">M-</button>
    <button class="mem" onclick="memoryRecall()">MR</button>
    <button class="clr" onclick="clearScreen()">C</button>
    <button class="op" onclick="press('/')">÷</button>
    <button class="op" onclick="press('*')">×</button>
    <button class="op" onclick="backspace()">⌫</button>
    <button onclick="press('7')">7</button>
    <button onclick="press('8')">8</button>
    <button onclick="press('9')">9</button>
    <button class="op" onclick="press('-')">−</button>
    <button onclick="press('4')">4</button>
    <button onclick="press('5')">5</button>
    <button onclick="press('6')">6</button>
    <button class="op" onclick="press('+')">+</button>
    <button onclick="press('1')">1</button>
    <button onclick="press('2')">2</button>
    <button onclick="press('3')">3</button>
    <button class="eq" onclick="calculate()">=</button>
    <button class="op" onclick="calcPercent()">%</button>
    <button onclick="press('0')">0</button>
    <button onclick="press('.')">.</button>
  </div>

  <!-- Length Converter -->
  <div class="section">
    <h3>📏 Length Converter</h3>
    <input type="number" id="valueLen" placeholder="Value daalen">
    <select id="fromLen"><option>Kilometer</option><option>Meter</option><option>Centimeter</option><option>Millimeter</option><option>Mile</option><option>Yard</option><option>Foot</option><option>Inch</option></select>
    <select id="toLen"><option>Meter</option><option>Kilometer</option><option>Centimeter</option><option>Millimeter</option><option>Mile</option><option>Yard</option><option>Foot</option><option>Inch</option></select>
    <button class="convert-btn" onclick="convertLength()">Convert ▶</button>
    <div class="result" id="resultLen"></div>
  </div>

  <!-- Mass Converter -->
  <div class="section">
    <h3>⚖️ Mass Converter</h3>
    <input type="number" id="valueMass" placeholder="Value daalen">
    <select id="fromMass"><option>Kilogram</option><option>Gram</option><option>Milligram</option><option>Ton</option><option>Pound</option><option>Ounce</option></select>
    <select id="toMass"><option>Gram</option><option>Kilogram</option><option>Milligram</option><option>Ton</option><option>Pound</option><option>Ounce</option></select>
    <button class="convert-btn" onclick="convertMass()">Convert ▶</button>
    <div class="result" id="resultMass"></div>
  </div>

  <!-- Currency Converter -->
  <div class="section">
    <h3>💱 Currency Converter <span class="live-badge">LIVE</span></h3>
    <div class="loading" id="rateStatus">⏳ Rates load ho rahi hain...</div>
    <input type="number" id="valueCurr" placeholder="Amount daalen" oninput="convertCurrency()">
    <div style="margin-bottom:5px;">
      <div style="color:#888;font-size:11px;margin-bottom:3px;">From:</div>
      <div class="custom-select" id="fromWrapper">
        <button class="selected-display" onclick="toggleDropdown('from')">🇵🇰 PKR - Pakistani Rupee ▼</button>
        <div class="dropdown-list" id="fromDropdown">
          <input class="search-box" placeholder="🔍 Search currency..." oninput="filterList('from', this.value)">
          <div id="fromList"></div>
        </div>
      </div>
    </div>
    <div style="margin-bottom:5px;">
      <div style="color:#888;font-size:11px;margin-bottom:3px;">To:</div>
      <div class="custom-select" id="toWrapper">
        <button class="selected-display" onclick="toggleDropdown('to')">🇺🇸 USD - US Dollar ▼</button>
        <div class="dropdown-list" id="toDropdown">
          <input class="search-box" placeholder="🔍 Search currency..." oninput="filterList('to', this.value)">
          <div id="toList"></div>
        </div>
      </div>
    </div>
    <div class="result" id="resultCurr"></div>
    <div class="rate-info" id="rateInfo"></div>
  </div>

</div>
<script>
// MENU
let menuOpen=false;
function toggleMenu(){
  menuOpen=!menuOpen;
  document.getElementById('menuDropdown').classList.toggle('open',menuOpen);
}
document.addEventListener('click',e=>{
  if(!e.target.closest('.menu-wrap')){menuOpen=false;document.getElementById('menuDropdown').classList.remove('open');}
  if(!e.target.closest('.custom-select')) document.querySelectorAll('.dropdown-list').forEach(el=>el.classList.remove('open'));
});

// MODE
let currentMode='basic';
function setMode(mode){
  currentMode=mode;
  document.getElementById('menuDropdown').classList.remove('open'); menuOpen=false;
  const sciRow=document.getElementById('sciRow');
  // FIX: properly toggle display between grid and none
  sciRow.style.display=(mode==='sci')?'grid':'none';
  document.getElementById('modeBadge').innerText=(mode==='sci')?'Scientific':'Basic';
  document.getElementById('menuBasic').classList.toggle('active',mode==='basic');
  document.getElementById('menuSci').classList.toggle('active',mode==='sci');
}

// HISTORY
let historyData=[],historyOpen=false;
function toggleHistory(){
  historyOpen=!historyOpen;
  document.getElementById('historyPanel').classList.toggle('open',historyOpen);
  document.getElementById('menuHistory').classList.toggle('active',historyOpen);
  document.getElementById('menuDropdown').classList.remove('open'); menuOpen=false;
  renderHistory();
}
function addToHistory(expr,result){
  if(!expr||expr==='0'||result==='Error') return;
  historyData.unshift({expr,result,time:new Date().toLocaleTimeString()});
  if(historyData.length>50) historyData.pop();
  if(historyOpen) renderHistory();
}
function renderHistory(){
  const list=document.getElementById('historyList');
  if(!historyData.length){list.innerHTML='<div class="history-empty">Abhi koi history nahi hai</div>';return;}
  list.innerHTML=historyData.map((h,i)=>`<div class="history-item" onclick="useHistory(${i})"><div class="h-expr">${h.expr}</div><div class="h-result">= ${h.result} <span style="font-size:10px;color:#444;">${h.time}</span></div></div>`).join('');
}
function useHistory(i){
  input=historyData[i].result;
  screenEl.innerText=input;
  document.getElementById('screenExpr').innerText=historyData[i].expr+' =';
}
function clearHistory(){ historyData=[]; renderHistory(); }

// CALCULATOR
let screenEl=document.getElementById('screen'),input='',memory=0;

function getDisplayText(val){
  return val.replace(/\*\*/g,'ʸ').replace(/Math\.PI/g,'π').replace(/Math\.E/g,'e');
}

function press(v){
  // FIX: allow chaining — don't wipe if input was a previous result unless it's '0'
  if(input==='0') input='';
  input+=v;
  screenEl.innerText=getDisplayText(input);
  document.getElementById('screenExpr').innerText='';
}

// FIX: separate function for inserting constants (π, e) so they don't get wiped
function insertConst(c){
  if(input==='0') input='';
  if(c==='pi') input+=String(Math.PI);
  else if(c==='e') input+=String(Math.E);
  screenEl.innerText=getDisplayText(input);
  document.getElementById('screenExpr').innerText='';
}

function clearScreen(){ input=''; screenEl.innerText='0'; document.getElementById('screenExpr').innerText=''; }
function backspace(){ 
  input=input.slice(0,-1); 
  if(!input) input='0'; 
  screenEl.innerText=getDisplayText(input); 
}
function calculate(){
  try{
    if(!input || input==='0'){ return; }
    let displayExpr=getDisplayText(input);
    let result=parseFloat(eval(input).toFixed(10)).toString();
    addToHistory(displayExpr,result);
    document.getElementById('screenExpr').innerText=displayExpr+' =';
    input=result; screenEl.innerText=result;
  } catch(err){ screenEl.innerText='Error'; input=''; }
}
function calcPercent(){
  try{
    if(!input||input==='0') return;
    let result=(parseFloat(input)/100).toString();
    addToHistory(input+'%',result);
    input=result; screenEl.innerText=input;
  } catch{}
}
function memoryClear(){ memory=0; }
function memoryAdd(){ memory+=parseFloat(input)||0; }
function memorySub(){ memory-=parseFloat(input)||0; }
function memoryRecall(){ input=memory.toString(); screenEl.innerText=input; }

// SCIENTIFIC — FIX: handle empty/zero input gracefully, show proper error messages
function sciFunc(fn){
  // FIX: treat '0' and '' both as 0
  let raw = (input===''||input==='0') ? '0' : input;
  let val = parseFloat(raw);

  // FIX: if val is NaN but input has operators (e.g. "3+4"), eval first
  if(isNaN(val) && raw!==''){
    try{ val=parseFloat(eval(raw)); } catch{ screenEl.innerText='Error'; return; }
  }
  if(isNaN(val)){ screenEl.innerText='Error'; return; }

  let result, displayExpr;
  try{
    switch(fn){
      case 'sin':
        result=Math.sin(val*Math.PI/180);
        displayExpr=`sin(${val}°)`;
        break;
      case 'cos':
        result=Math.cos(val*Math.PI/180);
        displayExpr=`cos(${val}°)`;
        break;
      case 'tan':
        // FIX: tan(90) is undefined, handle it
        if(val%180===90){ screenEl.innerText='Undefined'; return; }
        result=Math.tan(val*Math.PI/180);
        displayExpr=`tan(${val}°)`;
        break;
      case 'log':
        if(val<=0){ screenEl.innerText='Invalid (log≤0)'; return; }
        result=Math.log10(val);
        displayExpr=`log(${val})`;
        break;
      case 'ln':
        if(val<=0){ screenEl.innerText='Invalid (ln≤0)'; return; }
        result=Math.log(val);
        displayExpr=`ln(${val})`;
        break;
      case 'sqrt':
        if(val<0){ screenEl.innerText='Invalid (√<0)'; return; }
        result=Math.sqrt(val);
        displayExpr=`√(${val})`;
        break;
      case 'sq':
        result=val*val;
        displayExpr=`${val}²`;
        break;
      case 'inv':
        if(val===0){ screenEl.innerText='Divide by 0'; return; }
        result=1/val;
        displayExpr=`1/${val}`;
        break;
      case 'abs':
        result=Math.abs(val);
        displayExpr=`|${val}|`;
        break;
      default:
        return;
    }
    result=parseFloat(result.toFixed(10)).toString();
    addToHistory(displayExpr, result);
    document.getElementById('screenExpr').innerText=displayExpr+' =';
    input=result;
    screenEl.innerText=result;
  } catch(e){
    screenEl.innerText='Error';
    input='';
  }
}

// CONVERTERS
const meterMap={Kilometer:1000,Meter:1,Centimeter:0.01,Millimeter:0.001,Mile:1609.34,Yard:0.9144,Foot:0.3048,Inch:0.0254};
function convertLength(){let v=parseFloat(document.getElementById('valueLen').value);if(isNaN(v))return;let f=document.getElementById('fromLen').value,t=document.getElementById('toLen').value;document.getElementById('resultLen').innerText=parseFloat((v*meterMap[f]/meterMap[t]).toFixed(10));}
const kgMap={Kilogram:1,Gram:0.001,Milligram:1e-6,Ton:1000,Pound:0.453592,Ounce:0.0283495};
function convertMass(){let v=parseFloat(document.getElementById('valueMass').value);if(isNaN(v))return;let f=document.getElementById('fromMass').value,t=document.getElementById('toMass').value;document.getElementById('resultMass').innerText=parseFloat((v*kgMap[f]/kgMap[t]).toFixed(10));}

let selectedFrom='PKR',selectedTo='USD',rates={};
function buildList(type,filter=''){
  const listEl=document.getElementById(type+'List');listEl.innerHTML='';
  allCurrencies.filter(c=>(c.code+c.name).toLowerCase().includes(filter.toLowerCase())).forEach(c=>{
    const div=document.createElement('div');div.className='dropdown-item'+((type==='from'?selectedFrom:selectedTo)===c.code?' selected':'');
    div.innerText=c.flag+' '+c.code+' - '+c.name;div.onclick=()=>{selectCurrency(type,c.code,c.flag+' '+c.code+' - '+c.name);};listEl.appendChild(div);
  });
}
function toggleDropdown(type){const dd=document.getElementById(type+'Dropdown');document.querySelectorAll('.dropdown-list').forEach(el=>{if(el!==dd)el.classList.remove('open');});dd.classList.toggle('open');if(dd.classList.contains('open')){buildList(type);dd.querySelector('.search-box').focus();}}
function filterList(type,val){buildList(type,val);}
function selectCurrency(type,code,label){if(type==='from'){selectedFrom=code;document.querySelector('#fromWrapper .selected-display').innerText=label+' ▼';}else{selectedTo=code;document.querySelector('#toWrapper .selected-display').innerText=label+' ▼';}document.getElementById(type+'Dropdown').classList.remove('open');convertCurrency();}
async function loadRates(){
  const apis=['https://api.frankfurter.app/latest?from=USD','https://open.er-api.com/v6/latest/USD','https://api.exchangerate-api.com/v4/latest/USD'];
  for(let url of apis){try{let res=await fetch(url);let data=await res.json();if(data.rates){rates=data.rates;rates['USD']=1;document.getElementById('rateStatus').innerHTML='✅ Live rates updated!';document.getElementById('rateInfo').innerText='Updated: '+new Date().toLocaleTimeString();setTimeout(()=>{document.getElementById('rateStatus').style.display='none';},3000);convertCurrency();return;}}catch(e){continue;}}
  document.getElementById('rateStatus').innerHTML='⚠️ Offline rates use ho rahi hain';
  rates={USD:1,PKR:278,EUR:0.92,GBP:0.79,AED:3.67,SAR:3.75,INR:83.5,CAD:1.36,AUD:1.53,JPY:149,CNY:7.24,CHF:0.89,KWD:0.31,QAR:3.64,TRY:32.5,BDT:110,MYR:4.7,SGD:1.34,NGN:1550,EGP:48,IQD:1309,IRR:42000,JOD:0.71,LBP:89500,LYD:4.83,MAD:10.1,OMR:0.38,TND:3.13,YER:250,DZD:134,SDG:601,ZAR:18.6,KES:129,GHS:15.3,TZS:2500,UGX:3750,ETB:56,XAF:600,XOF:600,ZMW:26};
  convertCurrency();
}
function convertCurrency(){let v=parseFloat(document.getElementById('valueCurr').value);if(isNaN(v)||!rates.USD)return;let inUSD=v/rates[selectedFrom];let result=inUSD*rates[selectedTo];document.getElementById('resultCurr').innerText=result.toFixed(4)+' '+selectedTo;document.getElementById('rateInfo').innerText='1 '+selectedFrom+' = '+(rates[selectedTo]/rates[selectedFrom]).toFixed(6)+' '+selectedTo;}
loadRates();setInterval(loadRates,600000);
</script>
