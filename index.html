<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#4a90e2">
<title>CalcFlash ⚡ - Fixed</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/12.4.2/math.js"></script>
<style>
/* Same CSS as before - no changes needed */
*{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; margin:0; padding:0; }
html,body{ width:100%; background:#0f0f0f; font-family:Arial,sans-serif; color:white; overflow-x:hidden; }
.container{ width:100%; padding:8px; padding-top:4px; }
/* ... rest of CSS same as original ... */
</style>
</head>
<body>
<!-- Same HTML structure as before -->
<div class="container">
  <!-- Top Bar, History, Screen - SAME -->
  <div class="topbar">
    <div class="topbar-title">CalcFlash ⚡ <span class="mode-badge" id="modeBadge">Basic</span></div>
    <div class="menu-wrap">
      <button class="dots-btn" onclick="toggleMenu()">•••</button>
      <div class="menu-dropdown" id="menuDropdown">
        <div class="menu-item active" id="menuBasic" onclick="setMode('basic')">🔢 Basic</div>
        <div class="menu-item" id="menuSci" onclick="setMode('sci')">🔬 Scientific</div>
        <div class="menu-item" id="menuHistory" onclick="toggleHistory()">🕘 History</div>
      </div>
    </div>
  </div>

  <!-- History Panel - SAME -->
  <div class="history-panel" id="historyPanel">
    <div class="history-header">
      <span>🕘 History</span>
      <button class="history-clear" onclick="clearHistory()">Sab Clear</button>
    </div>
    <div class="history-list" id="historyList">
      <div class="history-empty">Abhi koi history nahi hai</div>
    </div>
  </div>

  <!-- Screen - SAME -->
  <div class="screen-expr" id="screenExpr"></div>
  <div class="screen" id="screen">0</div>

  <!-- FIXED Scientific Row -->
  <div class="sci-row" id="sciRow">
    <button class="sci" onclick="sciInput('sin(')">sin</button>
    <button class="sci" onclick="sciInput('cos(')">cos</button>
    <button class="sci" onclick="sciInput('tan(')">tan</button>
    <button class="sci" onclick="sciInput('log10(')">log</button>
    <button class="sci" onclick="sciInput('log(')">ln</button>
    <button class="sci" onclick="sciInput('sqrt(')">√</button>
    <button class="sci" onclick="sciInput('square(')">x²</button>
    <button class="sci" onclick="sciInput('1/(')">1/</button>
    <button class="sci" onclick="sciInput('pi')">π</button>
    <button class="sci" onclick="sciInput('e')">e</button>
    <button class="sci" onclick="sciInput('abs(')">|x|</button>
    <button class="sci" onclick="sciInput('^(')">xʸ</button>
  </div>

  <!-- Rest of buttons SAME -->
  <div class="buttons">
    <button class="mem" onclick="memoryClear()">MC</button>
    <button class="mem" onclick="memoryAdd()">M+</button>
    <button class="mem" onclick="memorySub()">M-</button>
    <button class="mem" onclick="memoryRecall()">MR</button>
    <button class="clr" onclick="clearScreen()">C</button>
    <button class="op" onclick="press('/')">÷</button>
    <button class="op" onclick="press('*')">×</button>
    <button class="op" onclick="backspace()">⌫</button>
    <button onclick="press('7')">7</button>
    <button onclick="press('8')">8</button>
    <button onclick="press('9')">9</button>
    <button class="op" onclick="press('-')">−</button>
    <button onclick="press('4')">4</button>
    <button onclick="press('5')">5</button>
    <button onclick="press('6')">6</button>
    <button class="op" onclick="press('+')">+</button>
    <button onclick="press('1')">1</button>
    <button onclick="press('2')">2</button>
    <button onclick="press('3')">3</button>
    <button class="eq" onclick="calculate()">=</button>
    <button class="op" onclick="calcPercent()">%</button>
    <button onclick="press('0')">0</button>
    <button onclick="press('.')">.</button>
  </div>

  <!-- Converters SAME - Length, Mass, Currency -->
  <!-- ... same converter sections ... -->
</div>

<script>
// FIXED JAVASCRIPT - Scientific Calculator PERFECT!
let screenEl=document.getElementById('screen'),screenExprEl=document.getElementById('screenExpr'),input='',memory=0;
let historyData=[],historyOpen=false,currentMode='basic',menuOpen=false;

// MENU & HISTORY FUNCTIONS - SAME
function toggleMenu(){menuOpen=!menuOpen;document.getElementById('menuDropdown').classList.toggle('open',menuOpen);}
document.addEventListener('click',e=>{
  if(!e.target.closest('.menu-wrap')){menuOpen=false;document.getElementById('menuDropdown').classList.remove('open');}
});
function setMode(mode){
  currentMode=mode; document.getElementById('menuDropdown').classList.remove('open');
  document.getElementById('sciRow').style.display=(mode==='sci')?'grid':'none';
  document.getElementById('modeBadge').innerText=(mode==='sci')?'Scientific':'Basic';
  document.getElementById('menuBasic').classList.toggle('active',mode==='basic');
  document.getElementById('menuSci').classList.toggle('active',mode==='sci');
}
function toggleHistory(){historyOpen=!historyOpen;document.getElementById('historyPanel').classList.toggle('open',historyOpen);renderHistory();}
function addToHistory(expr,result){if(!expr||expr==='0'||result==='Error')return;historyData.unshift({expr,result,time:new Date().toLocaleTimeString()});if(historyData.length>50)historyData.pop();if(historyOpen)renderHistory();}
function renderHistory(){const list=document.getElementById('historyList');if(!historyData.length){list.innerHTML='<div class="history-empty">Abhi koi history nahi hai</div>';return;}list.innerHTML=historyData.map((h,i)=>`<div class="history-item" onclick="useHistory(${i})"><div class="h-expr">${h.expr}</div><div class="h-result">= ${h.result} <span style="font-size:10px;color:#444;">${h.time}</span></div></div>`).join('');}
function useHistory(i){input=historyData[i].result;screenEl.innerText=input;screenExprEl.innerText=historyData[i].expr+' =';}
function clearHistory(){historyData=[];renderHistory();}

// ✅ FIXED CALCULATOR FUNCTIONS
function press(v){if(input==='0')input='';input+=v;updateDisplay();}
function clearScreen(){input='';screenEl.innerText='0';screenExprEl.innerText='';}
function backspace(){input=input.slice(0,-1)||'0';updateDisplay();}
function updateDisplay(){screenEl.innerText=input.replace(/\*\*/g,'^').replace(/pi/g,'π').replace(/e/g,'e');}

// 🔥 PERFECT SCIENTIFIC CALCULATION
function calculate(){
  try {
    // Clean input for math.js
    let cleanInput = input
      .replace(/×/g, '*')
      .replace(/÷/g, '/')
      .replace(/\^/g, '**')
      .replace(/π/g, 'pi')
      .replace(/e/g, 'e');
    
    // Use math.js for perfect calculation
    let result = math.evaluate(cleanInput);
    result = math.format(result, {precision: 10});
    
    addToHistory(input, result);
    screenExprEl.innerText = input + ' =';
    input = result;
    screenEl.innerText = result;
  } catch(e) {
    screenEl.innerText = 'Error';
    input = '';
  }
}

// ✅ NEW SCIENTIFIC INPUT FUNCTION
function sciInput(func) {
  if (input === '0' || input === 'Error') input = '';
  input += func;
  updateDisplay();
}

// Memory functions - SAME
function memoryClear(){memory=0;}
function memoryAdd(){memory+=parseFloat(input)||0;}
function memorySub(){memory-=parseFloat(input)||0;}
function memoryRecall(){input=memory.toString();screenEl.innerText=input;updateDisplay();}
function calcPercent(){try{let result=(parseFloat(input)/100).toString();addToHistory(input+'%',result);input=result;screenEl.innerText=input;}catch{}}

// CONVERTERS - SAME AS BEFORE (Length, Mass, Currency)
// ... paste the converter functions from original code ...

// Initialize
setMode('basic');
</script>
</body>
</html>
