<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a73e8">
<title>CalcFlash ⚡ Pro</title>
<style>
*{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; margin:0; padding:0; }

/* ===== THEME VARIABLES ===== */
:root[data-theme="dark"]{
  --bg:#0f0f0f;
  --surface:#1c1c1e;
  --surface2:#2c2c2e;
  --surface3:#3a3a3c;
  --btn-num:#2c2c2e;
  --btn-num-text:#ffffff;
  --screen-bg:#000;
  --screen-text:#ffffff;
  --text-main:#ffffff;
  --text-muted:#aaaaaa;
  --text-dim:#666666;
  --border:#3a3a3c;
  --sci-bg:#1a2535;
  --sci-text:#7eb8f7;
  --sci-active:#2a3f5a;
  --inv-bg:#2d1e0e;
  --inv-text:#f7a07e;
  --mode-bg:#1e2d40;
  --mode-text:#7eb8f7;
  --history-empty:#444444;
}
:root[data-theme="light"]{
  --bg:#f0f0f5;
  --surface:#ffffff;
  --surface2:#e8e8ed;
  --surface3:#d1d1d6;
  --btn-num:#e8e8ed;
  --btn-num-text:#1c1c1e;
  --screen-bg:#1c1c1e;
  --screen-text:#ffffff;
  --text-main:#1c1c1e;
  --text-muted:#555555;
  --text-dim:#999999;
  --border:#c8c8cc;
  --sci-bg:#ddeeff;
  --sci-text:#1a5fa8;
  --sci-active:#bbd6f2;
  --inv-bg:#fff0e0;
  --inv-text:#b05a00;
  --mode-bg:#ddeeff;
  --mode-text:#1a5fa8;
  --history-empty:#bbbbbb;
}

html,body{ width:100%; background:var(--bg); font-family:'Courier New',monospace; color:var(--text-main); overflow-x:hidden; transition:background 0.3s,color 0.3s; }
.container{ width:100%; padding:8px; padding-top:4px; max-width:600px; margin:0 auto; }

/* TOP BAR */
.topbar{ display:flex; justify-content:space-between; align-items:center; padding:4px 2px 6px 2px; }
.topbar-title{ font-size:16px; font-weight:bold; color:#4a90e2; letter-spacing:1px; font-family:Arial,sans-serif; }
.topbar-right{ display:flex; align-items:center; gap:6px; }

/* THEME TOGGLE */
.theme-toggle{
  background:var(--surface2); border:none; border-radius:20px; padding:4px 10px;
  color:var(--text-muted); font-size:16px; cursor:pointer; height:auto; width:auto;
  display:flex; align-items:center; gap:4px; transition:background 0.2s;
}
.theme-toggle:active{ opacity:0.7; }

.dots-btn{ background:none; border:none; color:var(--text-muted); font-size:24px; cursor:pointer; padding:4px 8px; border-radius:8px; height:auto; width:auto; line-height:1; letter-spacing:2px; }
.dots-btn:active{ background:var(--surface2); }
.menu-wrap{ position:relative; }
.menu-dropdown{ display:none; position:absolute; right:0; top:40px; background:var(--surface); border:1px solid var(--border); border-radius:12px; min-width:200px; z-index:1000; overflow:hidden; box-shadow:0 8px 24px rgba(0,0,0,0.3); }
.menu-dropdown.open{ display:block; }
.menu-item{ padding:13px 16px; font-size:14px; cursor:pointer; border-bottom:1px solid var(--surface2); display:flex; align-items:center; gap:10px; color:var(--text-muted); font-family:Arial,sans-serif; }
.menu-item:last-child{ border-bottom:none; }
.menu-item:active{ background:var(--surface2); }
.menu-item.active{ color:#4a90e2; background:var(--mode-bg); }

/* SCREEN */
.mode-badge{ display:inline-block; background:var(--mode-bg); color:var(--mode-text); font-size:10px; padding:2px 8px; border-radius:8px; margin-left:6px; vertical-align:middle; font-family:Arial,sans-serif; }
.deg-badge{ display:inline-block; background:var(--inv-bg); color:var(--inv-text); font-size:10px; padding:2px 8px; border-radius:8px; margin-left:4px; vertical-align:middle; font-family:Arial,sans-serif; cursor:pointer; }
.screen-expr{ font-size:12px; color:var(--text-dim); text-align:right; padding:0 4px 2px 4px; min-height:16px; font-family:Arial,sans-serif; }
.screen{ width:100%; min-height:60px; background:var(--screen-bg); color:var(--screen-text); font-size:28px; text-align:right; padding:10px 12px; border-radius:10px; margin-bottom:6px; word-break:break-all; line-height:1.3; font-family:'Courier New',monospace; transition:background 0.3s; }

/* BUTTONS GENERAL */
button{ height:50px; border:none; border-radius:11px; background:var(--btn-num); color:var(--btn-num-text); font-size:15px; cursor:pointer; touch-action:manipulation; width:100%; font-family:Arial,sans-serif; transition:background 0.1s,color 0.1s; }
button:active{ opacity:0.7; }

/* BASIC GRID */
.buttons{ display:grid; grid-template-columns:repeat(4,1fr); gap:5px; }
.mem{ background:var(--surface3); color:var(--text-muted); font-size:12px; }
.op{ color:#4a90e2; font-size:17px; }
.clr{ color:#ff5f57; }
.eq{ background:#4a90e2; color:white; font-size:22px; }
.eq:active{ background:#357abd; }

/* SCIENTIFIC LAYOUT */
.sci-full-grid{ display:none; grid-template-columns:repeat(7,1fr); gap:4px; margin-bottom:5px; }
.sci-full-grid.visible{ display:grid; }
.sf{ height:46px; border-radius:10px; font-size:12px; }
.sf-mem{ background:var(--surface3); color:var(--text-muted); font-size:11px; }
.sf-op{ background:var(--btn-num); color:#4a90e2; font-size:13px; }
.sf-sci{ background:var(--sci-bg); color:var(--sci-text); }
.sf-sci:active{ background:var(--sci-active); }
.sf-clr{ background:var(--btn-num); color:#ff5f57; font-size:15px; }
.sf-num{ background:var(--btn-num); color:var(--btn-num-text); font-size:16px; }
.sf-eq{ background:#4a90e2; color:white; font-size:20px; grid-row:span 2; height:96px; }
.sf-inv{ background:var(--inv-bg); color:var(--inv-text); }

/* HISTORY */
.history-panel{ background:var(--surface); border-radius:12px; padding:8px; margin-bottom:8px; display:none; font-family:Arial,sans-serif; border:1px solid var(--border); }
.history-panel.open{ display:block; }
.history-header{ display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
.history-header span{ color:var(--text-muted); font-size:11px; text-transform:uppercase; letter-spacing:1px; }
.history-clear{ background:var(--surface3); color:#ff5f57; border:none; font-size:11px; padding:4px 10px; border-radius:6px; cursor:pointer; height:auto; width:auto; }
.history-list{ max-height:180px; overflow-y:auto; }
.history-item{ padding:8px 10px; border-bottom:1px solid var(--surface2); cursor:pointer; border-radius:6px; }
.history-item:active{ background:var(--surface2); }
.history-item:last-child{ border-bottom:none; }
.h-expr{ font-size:12px; color:var(--text-dim); }
.h-result{ font-size:16px; color:#4a90e2; text-align:right; }
.history-empty{ text-align:center; color:var(--history-empty); font-size:13px; padding:20px; }

/* SECTIONS */
.section{ margin-top:8px; background:var(--surface); border-radius:12px; padding:8px; font-family:Arial,sans-serif; border:1px solid var(--border); }
.section h3{ color:var(--text-muted); font-size:11px; margin-bottom:5px; text-transform:uppercase; letter-spacing:1px; }
input[type=number]{ width:100%; padding:6px 10px; margin-bottom:5px; border-radius:8px; border:1px solid var(--border); background:var(--surface2); color:var(--text-main); font-size:14px; font-family:Arial,sans-serif; }
.convert-btn{ background:#4a90e2; color:white; width:100%; padding:8px; font-size:14px; border-radius:9px; border:none; cursor:pointer; font-family:Arial,sans-serif; }
.result{ margin-top:5px; background:var(--surface2); padding:7px 10px; border-radius:8px; color:#4a90e2; font-size:14px; min-height:30px; text-align:right; }
.rate-info{ font-size:11px; color:var(--text-dim); text-align:center; margin-top:4px; }
.live-badge{ background:#27ae60; color:white; font-size:10px; padding:2px 6px; border-radius:10px; margin-left:5px; }
.loading{ color:#f39c12; font-size:12px; text-align:center; padding:5px; }
.custom-select{ position:relative; margin-bottom:5px; }
.custom-select input.search-box{ width:100%; padding:6px 10px; border-radius:8px; border:1px solid var(--border); background:var(--surface2); color:var(--text-main); font-size:13px; font-family:Arial,sans-serif; }
.custom-select input.search-box::placeholder{ color:var(--text-muted); }
.dropdown-list{ display:none; position:absolute; width:100%; background:var(--surface); border:1px solid #4a90e2; border-radius:8px; max-height:180px; overflow-y:auto; z-index:999; top:36px; left:0; }
.dropdown-list.open{ display:block; }
.dropdown-item{ padding:8px 10px; cursor:pointer; font-size:13px; border-bottom:1px solid var(--surface2); font-family:Arial,sans-serif; color:var(--text-main); }
.dropdown-item:hover,.dropdown-item.selected{ background:#4a90e2; color:white; }
.selected-display{ width:100%; padding:6px 10px; border-radius:8px; border:1px solid var(--border); background:var(--surface2); color:var(--text-main); font-size:13px; cursor:pointer; text-align:left; margin-bottom:2px; font-family:Arial,sans-serif; height:auto; }
select{ width:100%; padding:6px 10px; margin-bottom:5px; border-radius:8px; border:1px solid var(--border); background:var(--surface2); color:var(--text-main); font-size:13px; -webkit-appearance:none; appearance:none; font-family:Arial,sans-serif; }

/* WHATSAPP BUTTON */
.whatsapp-btn{
  display:flex; align-items:center; justify-content:center; gap:10px;
  width:100%; padding:14px; margin-top:12px; margin-bottom:8px;
  background:linear-gradient(135deg,#25d366,#128c7e);
  color:white; font-size:15px; font-weight:bold;
  border:none; border-radius:14px; cursor:pointer;
  font-family:Arial,sans-serif;
  box-shadow:0 4px 15px rgba(37,211,102,0.3);
  transition:all 0.2s; height:auto;
}
.whatsapp-btn:active{ transform:scale(0.97); box-shadow:0 2px 8px rgba(37,211,102,0.2); }
.whatsapp-icon{ width:24px; height:24px; flex-shrink:0; }
.whatsapp-sub{ font-size:11px; color:var(--text-dim); text-align:center; margin-bottom:16px; font-family:Arial,sans-serif; }
</style>
</head>
<body>
<div class="container">

  <!-- Top Bar -->
  <div class="topbar">
    <div class="topbar-title">
      CalcFlash ⚡
      <span class="mode-badge" id="modeBadge">Basic</span>
    </div>
    <div class="topbar-right">
      <!-- Light/Dark Toggle -->
      <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn" title="Light/Dark Mode">🌙</button>
      <div class="menu-wrap">
        <button class="dots-btn" onclick="toggleMenu()">•••</button>
        <div class="menu-dropdown" id="menuDropdown">
          <div class="menu-item active" id="menuBasic" onclick="setMode('basic')">🔢 &nbsp;Basic Calculator</div>
          <div class="menu-item" id="menuSci" onclick="setMode('sci')">🔬 &nbsp;Scientific Calculator</div>
          <div class="menu-item" id="menuHistory" onclick="toggleHistory()">🕘 &nbsp;History</div>
        </div>
      </div>

  <!-- History Panel -->
  <div class="history-panel" id="historyPanel">
    <div class="history-header">
      <span>🕘 History</span>
      <button class="history-clear" onclick="clearHistory()">Sab Clear</button>
    </div>
    <div class="history-list" id="historyList">
      <div class="history-empty">Abhi koi history nahi hai</div>
    </div>
  </div>

  <!-- Screen -->
  <div class="screen-expr" id="screenExpr"></div>
  <div class="screen" id="screen">0</div>

  <!-- ===== SCIENTIFIC FULL LAYOUT ===== -->
  <div class="sci-full-grid" id="sciFullGrid">
    <button class="sf sf-sci" onclick="pressStr('(')">(</button>
    <button class="sf sf-sci" onclick="pressStr(')')">)</button>
    <button class="sf sf-sci" onclick="sciFunc('inv')">1/x</button>
    <button class="sf sf-mem" onclick="memoryClear()">MC</button>
    <button class="sf sf-mem" onclick="memoryAdd()">M+</button>
    <button class="sf sf-mem" onclick="memorySub()">M-</button>
    <button class="sf sf-mem" onclick="memoryRecall()">MR</button>

    <button class="sf sf-sci" onclick="sciFunc('sq')">x²</button>
    <button class="sf sf-sci" onclick="sciFunc('cube')">x³</button>

    <button class="sf sf-clr" onclick="clearScreen()">C</button>
    <button class="sf sf-op" onclick="pressStr('/')">÷</button>
    <button class="sf sf-op" onclick="pressStr('*')">×</button>
    <button class="sf sf-op" onclick="backspace()">⌫</button>

    <button class="sf sf-sci" onclick="sciFunc('fact')">x!</button>

    <button class="sf sf-sci" onclick="sciFunc('log')">lg</button>

    <button class="sf sf-num" onclick="press('5')">5</button>
    <button class="sf sf-num" onclick="press('6')">6</button>
    <button class="sf sf-op" onclick="pressStr('+')">+</button>

    <button class="sf sf-sci" onclick="sciFunc('sin')">sin</button>
    <button class="sf sf-sci" onclick="sciFunc('cos')">cos</button>
    <button class="sf sf-sci" onclick="sciFunc('tan')">tan</button>
    <button class="sf sf-num" onclick="press('1')">1</button>

  </div>

  <!-- ===== BASIC LAYOUT ===== -->

  <!-- Mass Converter -->
  <div class="section">
    <h3>⚖️ Mass Converter</h3>

  </button>

<script>
// ===== THEME TOGGLE =====
let isDark = true;
function toggleTheme(){
  isDark = !isDark;
  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
  document.getElementById('themeBtn').innerText = isDark ? '🌙' : '☀️';
}

// ===== MENU =====
let menuOpen=false;
function toggleMenu(){
  menuOpen=!menuOpen;
  document.getElementById('menuDropdown').classList.toggle('open',menuOpen);
}
document.addEventListener('click',e=>{
  if(!e.target.closest('.menu-wrap')){menuOpen=false;document.getElementById('menuDropdown').classList.remove('open');}
  if(!e.target.closest('.custom-select')) document.querySelectorAll('.dropdown-list').forEach(el=>el.classList.remove('open'));
});

// ===== MODE =====
let currentMode='basic';
function setMode(mode){
  currentMode=mode;
  document.getElementById('menuDropdown').classList.remove('open'); menuOpen=false;
  document.getElementById('sciFullGrid').classList.toggle('visible', mode==='sci');
  document.getElementById('basicPanel').style.display=(mode==='sci')?'none':'block';
  document.getElementById('modeBadge').innerText=(mode==='sci')?'Scientific':'Basic';
  document.getElementById('menuBasic').classList.toggle('active',mode==='basic');
  document.getElementById('menuSci').classList.toggle('active',mode==='sci');
}

// ===== HISTORY =====
let historyData=[],historyOpen=false;
function toggleHistory(){
  historyOpen=!historyOpen;
  document.getElementById('historyPanel').classList.toggle('open',historyOpen);
  document.getElementById('menuHistory').classList.toggle('active',historyOpen);
  document.getElementById('menuDropdown').classList.remove('open'); menuOpen=false;
  renderHistory();
}
function addToHistory(expr,result){
  if(!expr||expr==='0'||result==='Error') return;
  historyData.unshift({expr,result,time:new Date().toLocaleTimeString()});
  if(historyData.length>50) historyData.pop();
  if(historyOpen) renderHistory();
}
function renderHistory(){
  const list=document.getElementById('historyList');
  if(!historyData.length){list.innerHTML='<div class="history-empty">Abhi koi history nahi hai</div>';return;}
  list.innerHTML=historyData.map((h,i)=>`<div class="history-item" onclick="useHistory(${i})"><div class="h-expr">${h.expr}</div><div class="h-result">= ${h.result} <span style="font-size:10px;color:var(--text-dim)">${h.time}</span></div></div>`).join('');
}
function useHistory(i){
  input=historyData[i].result;
  screenEl.innerText=input;
  document.getElementById('screenExpr').innerText=historyData[i].expr+' =';
}
function clearHistory(){ historyData=[]; renderHistory(); }

// ===== CALCULATOR CORE =====
let screenEl=document.getElementById('screen'), input='', memory=0;
let isInv=false, isDeg=true;

function getDisplayText(val){
  return val.replace(/\*\*/g,'ʸ').replace(/Math\.PI/g,'π').replace(/Math\.E/g,'e');
}
function press(v){
  if(input==='0'||input==='') input='';
  else if(/^-?\d*\.?\d+$/.test(input) && v==='0' && input==='0') return;
  input+=v; screenEl.innerText=getDisplayText(input);
  document.getElementById('screenExpr').innerText='';
}
function pressStr(v){
  if(input===''&&(v==='-'||v==='+')){input=v;}
  else input+=v;
  screenEl.innerText=getDisplayText(input);
  document.getElementById('screenExpr').innerText='';
}
function insertConst(c){
  if(input==='0'||input==='') input='';
  if(c==='pi') input+=String(Math.PI);
  else if(c==='e') input+=String(Math.E);
  screenEl.innerText=getDisplayText(input);
  document.getElementById('screenExpr').innerText='';
}
function clearScreen(){ input=''; screenEl.innerText='0'; document.getElementById('screenExpr').innerText=''; }
function backspace(){
  input=input.slice(0,-1);
  if(!input) input='';
  screenEl.innerText=input||'0';
}
function calculate(){
  try{
    if(!input||input==='0') return;
    let displayExpr=getDisplayText(input);
    let evaled=eval(input);
    if(!isFinite(evaled)) throw new Error('Infinity');
    let result=parseFloat(evaled.toFixed(10)).toString();
    addToHistory(displayExpr,result);
    document.getElementById('screenExpr').innerText=displayExpr+' =';
    input=result; screenEl.innerText=result;
  } catch(err){ screenEl.innerText='Error'; input=''; }
}
function calcPercent(){
  try{
    if(!input||input==='0') return;
    let val=parseFloat(eval(input));
    let result=(val/100).toString();
    addToHistory(input+'%',result);
    input=result; screenEl.innerText=input;
  } catch{}
}

// ===== MEMORY =====
function memoryClear(){ memory=0; }
function memoryAdd(){ try{ memory+=parseFloat(eval(input))||0; }catch{} }
function memorySub(){ try{ memory-=parseFloat(eval(input))||0; }catch{} }
function memoryRecall(){ input=memory.toString(); screenEl.innerText=input; }

// ===== FACTORIAL =====
function factorial(n){
  n=Math.round(n); if(n<0) return NaN; if(n===0||n===1) return 1;
  if(n>170) return Infinity; let r=1; for(let i=2;i<=n;i++) r*=i; return r;
}

// ===== SCIENTIFIC FUNCTIONS =====
function sciFunc(fn){
  let raw=(input===''||input==='0')?'0':input;
  let val; try{ val=parseFloat(eval(raw)); } catch{ screenEl.innerText='Error'; return; }
  if(isNaN(val)){screenEl.innerText='Error';return;}
  let toRad=isDeg?(Math.PI/180):1, fromRad=isDeg?(180/Math.PI):1;
  let result, displayExpr;
  try{
    switch(fn){
      case 'sin': if(isInv){result=Math.asin(val)*fromRad;displayExpr=`asin(${val})`;}else{result=Math.sin(val*toRad);displayExpr=`sin(${val}${isDeg?'°':'rad'})`;} break;
      case 'cos': if(isInv){result=Math.acos(val)*fromRad;displayExpr=`acos(${val})`;}else{result=Math.cos(val*toRad);displayExpr=`cos(${val}${isDeg?'°':'rad'})`;} break;
      case 'tan': if(isInv){result=Math.atan(val)*fromRad;displayExpr=`atan(${val})`;}else{if(isDeg&&val%180===90){screenEl.innerText='Undefined';return;}result=Math.tan(val*toRad);displayExpr=`tan(${val}${isDeg?'°':'rad'})`;} break;
      case 'log': if(val<=0){screenEl.innerText='Invalid';return;} if(isInv){result=Math.pow(10,val);displayExpr=`10^${val}`;}else{result=Math.log10(val);displayExpr=`log(${val})`;} break;
      case 'ln': if(val<=0){screenEl.innerText='Invalid';return;} if(isInv){result=Math.exp(val);displayExpr=`e^${val}`;}else{result=Math.log(val);displayExpr=`ln(${val})`;} break;
      case 'sqrt': if(val<0){screenEl.innerText='Invalid';return;} result=Math.sqrt(val);displayExpr=`√(${val})`; break;
      case 'nthroot': let y=prompt('Kaun si root? (e.g. 3 for cube root)','3'); if(!y) return; y=parseFloat(y); if(isNaN(y)||y===0){screenEl.innerText='Invalid';return;} result=Math.pow(val,1/y);displayExpr=`${y}√(${val})`; break;
      case 'sq': result=val*val;displayExpr=`${val}²`; break;
      case 'cube': result=val*val*val;displayExpr=`${val}³`; break;
      case 'inv': if(val===0){screenEl.innerText='Div/0';return;} result=1/val;displayExpr=`1/${val}`; break;
      case 'fact': if(val<0||!Number.isInteger(val)){screenEl.innerText='Invalid';return;} result=factorial(val); if(!isFinite(result)){screenEl.innerText='Too Large';return;} displayExpr=`${val}!`; break;
      default: return;
    }
    if(result===undefined||!isFinite(result)){screenEl.innerText='Error';return;}
    result=parseFloat(result.toFixed(10)).toString();
    addToHistory(displayExpr,result);
    document.getElementById('screenExpr').innerText=displayExpr+' =';
    input=result; screenEl.innerText=result;
    if(isInv){ isInv=false; document.getElementById('invBtn').style.background=''; document.getElementById('invBtn').style.color=''; }
  } catch(e){ screenEl.innerText='Error'; input=''; }
}

    const div=document.createElement('div'); div.className='dropdown-item'+((type==='from'?selectedFrom:selectedTo)===c.code?' selected':'');
